name: ci

on:
  push:
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

# TypeScript workspace (protocol + legacy server + ui) plus the official Rust gateway.
# The legacy server remains in tests as the transition oracle. The official runtime is
# the Rust gateway, which depends on edgecommons/libs/rust through a generated local link.
# Until the GitHub Packages npm path is published, CI checks out the private core repo, builds
# libs/ts, and generates gitignored local workspace stubs before install/build. package-lock.json
# is intentionally gitignored because it records local dev links, so we `npm install` rather than
# `npm ci`.
jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Checkout core library until the GitHub Packages path is published
        uses: actions/checkout@v4
        with:
          repository: edgecommons/edgecommons
          token: ${{ secrets.EDGECOMMONS_READ_TOKEN || secrets.GITHUB_TOKEN }}
          path: .edgecommons-core
      - uses: actions/setup-node@v4
        with:
          node-version: "22"  # global WebSocket (used by the ws round-trip tests) is stable from Node 22
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - name: Build core TypeScript library
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const pkgPath = ".edgecommons-core/libs/ts/package.json";
          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          if (pkg.optionalDependencies) {
            delete pkg.optionalDependencies["@edgecommons/streamlog-node"];
            if (Object.keys(pkg.optionalDependencies).length === 0) {
              delete pkg.optionalDependencies;
            }
          }
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");
          NODE
          npm install --no-audit --no-fund --prefix "$GITHUB_WORKSPACE/.edgecommons-core/libs/ts"
          npm run build --prefix "$GITHUB_WORKSPACE/.edgecommons-core/libs/ts"
      - name: Link checked-out core TypeScript library
        env:
          EDGECOMMONS_TS_LIB: ${{ github.workspace }}/.edgecommons-core/libs/ts
        run: npm run link:lib
      - name: Link checked-out core Rust library
        env:
          EDGECOMMONS_RUST_LIB: ${{ github.workspace }}/.edgecommons-core/libs/rust
        run: node scripts/link-sibling-rust.mjs
      - name: Install (workspace)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.EDGECOMMONS_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: npm install --no-audit --no-fund
      - name: Build (protocol -> ui -> Rust gateway)
        env:
          EDGECOMMONS_RUST_LIB: ${{ github.workspace }}/.edgecommons-core/libs/rust
        run: npm run build
      - name: Test Rust gateway
        run: cargo test -p edge-console-gateway
      - name: Test (server + ui)
        run: npm test
      - name: Lint
        run: npm run lint
