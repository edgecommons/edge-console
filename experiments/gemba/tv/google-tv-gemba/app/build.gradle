plugins {
    id "com.android.application"
}

android {
    namespace "dev.edgecommons.gembatv"
    compileSdk 36

    defaultConfig {
        applicationId "dev.edgecommons.gembatv"
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName "0.1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation "com.squareup.okhttp3:okhttp:5.4.0"
}
