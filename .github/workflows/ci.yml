name: ci

on:
  push:
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

# TypeScript workspace (protocol + ui) plus the official Rust gateway. The Rust gateway is
# the official runtime and depends on edgecommons/libs/rust through a generated local link.
# Until the crate is published, CI checks out the private core repo and generates the gitignored
# local Rust-lib link before install/build. package-lock.json is intentionally gitignored because
# it records the local dev link, so we `npm install` rather than `npm ci`.
jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Checkout core library until the GitHub Packages path is published
        uses: actions/checkout@v4
        with:
          repository: edgecommons/edgecommons
          token: ${{ secrets.EDGECOMMONS_READ_TOKEN || secrets.GITHUB_TOKEN }}
          path: .edgecommons-core
      - uses: actions/setup-node@v4
        with:
          node-version: "22"  # global WebSocket (used by the ws round-trip tests) is stable from Node 22
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - name: Link checked-out core Rust library
        env:
          EDGECOMMONS_RUST_LIB: ${{ github.workspace }}/.edgecommons-core/libs/rust
        run: node scripts/link-sibling-rust.mjs
      - name: Install (workspace)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.EDGECOMMONS_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: npm install --no-audit --no-fund
      - name: Build (protocol -> ui -> Rust gateway)
        env:
          EDGECOMMONS_RUST_LIB: ${{ github.workspace }}/.edgecommons-core/libs/rust
        run: npm run build
      - name: Test Rust gateway
        run: cargo test -p edge-console-gateway
      - name: Test (protocol + ui)
        run: npm test
      - name: Lint
        run: npm run lint
